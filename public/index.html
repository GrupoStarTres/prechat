 <!doctype html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>BGF Tech Assistant - Diagnóstico Automotriz</title>
		<style>
			:root {
				--primary-color: #004274; /* Color azul del logo BGF */
				--accent-orange: #f97316;
				--primary-hover: #002d50;
				--light-bg: #f8fafc;
				--border-color: #e2e8f0;
				--text-color: #1e293b;
				--text-light: #64748b;
				--user-msg-bg: #f1f5f9;
				--assistant-msg-bg: #ffffff;
			}

			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				font-family: 'Inter', -apple-system, system-ui, sans-serif;
				line-height: 1.6;
				color: var(--text-color);
				background-color: #f1f5f9;
				max-width: 900px;
				margin: 0 auto;
				padding: 1rem;
			}

			/* Estilo del Logo Minimalista */
			.logo-container {
				display: flex;
				flex-direction: column;
				align-items: center;
				margin-bottom: 0.5rem;
			}

			.bgf-logo {
				width: 60px;
				height: auto;
				margin-bottom: 10px;
			}

			header {
				text-align: center;
				margin-bottom: 1.5rem;
				padding: 2rem 1rem;
				background: white;
				border-radius: 20px;
				box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
			}

			h1 {
				font-size: 1.5rem;
				font-weight: 800;
				letter-spacing: -0.025em;
				color: var(--primary-color);
				text-transform: uppercase;
			}

			header p {
				font-size: 0.9rem;
				color: var(--text-light);
			}

			.chat-container {
				display: flex;
				flex-direction: column;
				height: calc(100vh - 300px);
				min-height: 450px;
				border-radius: 24px;
				overflow: hidden;
				box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
				background-color: white;
			}

			.chat-messages {
				flex: 1;
				overflow-y: auto;
				padding: 1.5rem;
				background-color: var(--light-bg);
				display: flex;
				flex-direction: column;
				gap: 1rem;
			}

			.message {
				padding: 0.8rem 1.2rem;
				border-radius: 18px;
				max-width: 85%;
				font-size: 0.95rem;
			}

			.user-message {
				background-color: var(--primary-color);
				color: white;
				align-self: flex-end;
				border-bottom-right-radius: 4px;
			}

			.assistant-message {
				background-color: var(--assistant-msg-bg);
				color: var(--text-color);
				align-self: flex-start;
				border-bottom-left-radius: 4px;
				border: 1px solid var(--border-color);
			}

			.message-input {
				display: flex;
				padding: 1.2rem;
				background-color: white;
				gap: 0.75rem;
				align-items: center;
			}

			#user-input {
				flex: 1;
				padding: 0.8rem 1.2rem;
				border: 1px solid var(--border-color);
				border-radius: 100px;
				font-family: inherit;
				resize: none;
				max-height: 100px;
				outline: none;
				background: var(--light-bg);
			}

			#send-button {
				width: 45px;
				height: 45px;
				background-color: var(--primary-color);
				color: white;
				border: none;
				border-radius: 50%;
				cursor: pointer;
				display: flex;
				align-items: center;
				justify-content: center;
				transition: transform 0.2s;
			}

			#send-button:hover { transform: scale(1.05); }

			footer {
				margin-top: 1.5rem;
				text-align: center;
				font-size: 0.75rem;
				color: var(--text-light);
			}
		</style>
	</head>
	<body>
		<header>
			<div class="logo-container">
				<svg class="bgf-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
					<path d="M45 15 L20 85 H35 L52 38 L69 85 H84 L59 15 Z" fill="#004274"/>
					<path d="M40 55 H64 L68 65 H36 Z" fill="#00355d"/>
					<text x="50%" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="14" fill="#004274">BGF</text>
				</svg>
				<h1>Tech Assistant</h1>
			</div>
			<p>Diagnóstico automotriz y electrónica especializada</p>
		</header>

		<div class="chat-container">
			<div id="chat-messages" class="chat-messages">
				<div class="message assistant-message">
					<p>¡Hola! Soy el asistente técnico de <strong>BGF Tech</strong>. ¿En qué puedo asesorarte hoy?</p>
				</div>
			</div>

			<div class="message-input">
				<textarea id="user-input" placeholder="Escribe tu consulta aquí..." rows="1"></textarea>
				<button id="send-button">
					<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
				</button>
			</div>
		</div>

		<footer>
			<p>© 2026 BGF Tech Shop · Innovación en Diagnóstico Automotriz</p>
		</footer>

		<script src="chat.js"></script>
	</body>
</html>
