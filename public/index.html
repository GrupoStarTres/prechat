 <!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BGF Tech Assistant</title>
    <style>
        :root {
            --bgf-blue: #004274;
            --light-gray: #f3f4f6;
            --text-main: #1f2937;
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: #ffffff;
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* LOGO MINIMALISTA BGF */
        .header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        .logo-bgf {
            width: 50px;
            height: 50px;
            margin: 0 auto 10px;
        }

        .logo-bgf svg {
            width: 100%;
            height: 100%;
        }

        h1 {
            font-size: 1.2rem;
            margin: 0;
            letter-spacing: 1px;
            color: var(--bgf-blue);
        }

        /* CHAT AREA */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .assistant {
            background-color: var(--light-gray);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .user {
            background-color: var(--bgf-blue);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        /* INPUT AREA */
        .input-area {
            padding: 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
        }

        button {
            background: var(--bgf-blue);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .typing {
            font-size: 0.8rem;
            color: #999;
            margin-left: 20px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-bgf">
            <svg viewBox="0 0 100 100">
                <path d="M20,80 L50,20 L80,80" fill="none" stroke="#004274" stroke-width="8" stroke-linejoin="round"/>
                <path d="M35,80 L50,50 L65,80" fill="none" stroke="#004274" stroke-width="8" stroke-linejoin="round"/>
                <path d="M10,80 H90" fill="none" stroke="#004274" stroke-width="8" />
            </svg>
        </div>
        <h1>BGF TECH SHOP</h1>
    </div>

    <div class="chat-container" id="chat-messages">
        <div class="message assistant">
            Hola. Soy tu asistente técnico. ¿En qué puedo ayudarte hoy?
        </div>
    </div>

    <div id="typing" class="typing">Escribiendo...</div>

    <form class="input-area" id="chat-form">
        <input type="text" id="user-input" placeholder="Pregunta algo..." stroke-width="2">
        <button type="submit">Enviar</button>
    </form>

    <script src="chat.js"></script>
</body>
</html>
